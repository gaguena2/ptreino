services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ptreino-server
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://ptreino:ptreino@db:5432/ptreino
      JWT_SECRET: ${JWT_SECRET:-troque_por_uma_chave_segura}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ptreino-net

  db:
    image: postgres:16-alpine
    container_name: ptreino-db
    environment:
      POSTGRES_USER: ptreino
      POSTGRES_PASSWORD: ptreino
      POSTGRES_DB: ptreino
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptreino"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ptreino-net

volumes:
  pgdata:

networks:
  ptreino-net:
    driver: bridge
